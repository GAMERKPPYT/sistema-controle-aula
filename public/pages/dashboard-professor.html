<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sistema de Controle de Aulas — Professor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="dash-layout">

  <!-- Desktop Sidebar -->
  <aside class="app-sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">P</div>
      <span>Controle de Aulas</span>
    </div>
    
    <nav class="sidebar-nav">
      <button class="sidebar-link active" onclick="switchTab('lista')" id="sb-lista">
        Minhas Aulas
      </button>
      <button class="sidebar-link" onclick="switchTab('nova')" id="sb-nova">
        Registrar Aula
      </button>
    </nav>
    
    <div class="sidebar-footer">
      <div class="header-user">
        <div class="user-avatar" id="desktop-user-avatar">P</div>
        <div class="user-info">
          <div class="user-name" id="desktop-user-name" style="color:var(--text-main);">Carregando...</div>
          <div class="user-role" id="desktop-user-role">Professor</div>
        </div>
      </div>
      <button class="btn btn-icon" onclick="doLogout()" title="Sair" aria-label="Sair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- Mobile Header -->
  <header class="dash-header-mobile">
    <div class="header-logo">
      <div class="logo-icon">P</div>
      <div class="header-brand">Controle de Aulas<span>Professor</span></div>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="doLogout()">Sair</button>
  </header>

  <main class="dash-main">

    <!-- Tabs for Mobile -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('lista')" id="tab-lista">Minhas Aulas</button>
      <button class="tab-btn" onclick="switchTab('nova')" id="tab-nova">Nova Aula</button>
    </div>

    <!-- PANE: Lista -->
    <div id="pane-lista">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Aulas este mês</div>
          <div class="stat-value" id="stat-month">—</div>
          <div class="stat-sub" id="stat-month-label">Carregando...</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total geral</div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-sub">Todas as aulas</div>
        </div>
      </div>

      <div class="filter-bar">
        <div class="filter-group">
          <label>Mês</label>
          <select id="filter-month" class="form-input no-icon" onchange="loadMyLessons()"></select>
        </div>
        <div class="filter-group">
          <label>Ano</label>
          <select id="filter-year" class="form-input no-icon" onchange="loadMyLessons()"></select>
        </div>
      </div>

      <div class="section-hd">
        <div class="section-title">Minhas Aulas <span id="lesson-count"></span></div>
      </div>

      <div id="lesson-list" class="lesson-list">
        <div class="empty-state">
          <p>Carregando aulas...</p>
        </div>
      </div>
    </div>

    <!-- PANE: Nova Aula -->
    <div id="pane-nova" class="hidden">
      <div class="panel">
        <div class="panel-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Registrar Aula
        </div>
        <div id="form-alert" class="alert hidden"></div>

        <form id="lesson-form" novalidate>
          <div class="form-row cols-2">
            <div class="form-group">
              <label class="form-label" for="f-date">Data *</label>
              <input type="date" id="f-date" class="form-input no-icon" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="f-time">Hora *</label>
              <input type="time" id="f-time" class="form-input no-icon" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Dia da Semana</label>
            <input type="text" id="f-weekday" class="form-input no-icon" readonly style="opacity:.7;cursor:default">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-student">Aluno *</label>
            <input type="text" id="f-student" list="student-list" class="form-input no-icon" placeholder="Digite ou selecione o aluno..." required maxlength="100" autocomplete="off">
            <datalist id="student-list"></datalist>
          </div>
          <div class="form-row cols-2">
            <div class="form-group">
              <label class="form-label" for="f-type">Tipo de Treino</label>
              <select id="f-type" class="form-input no-icon">
                <option value="">Selecionar...</option>
                <option>Musculação</option><option>Funcional</option><option>Cardio</option>
                <option>Pilates</option><option>HIIT</option><option>Alongamento</option>
                <option>Avaliação Física</option><option>Outro</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="f-duration">Duração (min)</label>
              <input type="number" id="f-duration" class="form-input no-icon" value="60" min="1" max="480">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="f-obs">Observações</label>
            <textarea id="f-obs" class="form-input no-icon" placeholder="Anotações sobre a aula..." maxlength="500"></textarea>
          </div>
          <button type="submit" id="save-btn" class="btn btn-primary btn-full">
            <span id="save-txt">Registrar Aula</span>
            <span id="save-load" class="hidden flex items-center gap-1"><span class="spinner"></span> Salvando...</span>
          </button>
        </form>
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-lista" onclick="switchTab('lista')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3" y2="6"/>
        <line x1="3" y1="12" x2="3" y2="12"/><line x1="3" y1="18" x2="3" y2="18"/>
      </svg>
      Minhas Aulas
    </button>
    <button class="nav-item" id="nav-nova" onclick="switchTab('nova')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Nova Aula
    </button>
    <button class="nav-item" onclick="doLogout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sair
    </button>
  </nav>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
      <div class="modal-header">
        <h2 class="modal-title" id="edit-modal-title">Editar Aula</h2>
        <button class="modal-close" onclick="closeEditModal()" aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="edit-alert" class="alert hidden"></div>
        <form id="edit-form" novalidate>
          <input type="hidden" id="edit-id">
          <div class="form-row cols-2">
            <div class="form-group">
              <label class="form-label" for="e-date">Data *</label>
              <input type="date" id="e-date" class="form-input no-icon" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="e-time">Hora *</label>
              <input type="time" id="e-time" class="form-input no-icon" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Dia da Semana</label>
            <input type="text" id="e-weekday" class="form-input no-icon" readonly style="opacity:.7;cursor:default">
          </div>
          <div class="form-group">
            <label class="form-label" for="e-student">Aluno *</label>
            <input type="text" id="e-student" list="student-list-edit" class="form-input no-icon" placeholder="Digite ou selecione o aluno..." required maxlength="100" autocomplete="off">
            <datalist id="student-list-edit"></datalist>
          </div>
          <div class="form-row cols-2">
            <div class="form-group">
              <label class="form-label" for="e-type">Tipo de Treino</label>
              <select id="e-type" class="form-input no-icon">
                <option value="">Selecionar...</option>
                <option>Musculação</option><option>Funcional</option>
                <option>Cardio</option><option>Pilates</option>
                <option>HIIT</option><option>Alongamento</option>
                <option>Avaliação Física</option><option>Outro</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="e-duration">Duração (min)</label>
              <input type="number" id="e-duration" class="form-input no-icon" min="1" max="480">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="e-obs">Observações</label>
            <textarea id="e-obs" class="form-input no-icon" maxlength="500"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-full" onclick="closeEditModal()">Cancelar</button>
        <button class="btn btn-primary btn-full" id="edit-save-btn" onclick="saveEdit()">
          <span id="edit-save-txt">Salvar</span>
          <span id="edit-save-load" class="hidden"><span class="spinner"></span></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete -->
  <div id="confirm-overlay" class="confirm-overlay hidden">
    <div class="confirm-box">
      <div class="confirm-title">Excluir Aula?</div>
      <div class="confirm-msg">Esta ação não pode ser desfeita. Deseja continuar?</div>
      <div class="confirm-actions">
        <button class="btn btn-secondary" onclick="closeConfirm()">Cancelar</button>
        <button class="btn btn-danger" id="confirm-yes">Excluir</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>

  <script src="/js/lessons.js"></script>
</body>
</html>
